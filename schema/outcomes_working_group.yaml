    - name
    - description
    - cell_line
    - primary_cell
    - cell_type
    - anatomical_origin
    - cell_culture_growth_mode
    - culture_conditions
    - culture_media
    - model_species
    - coculture_configuration
    - cell_type_ratios
    - substrate_type
    class_uri: NAMO:0000004
  QuantityRange:
