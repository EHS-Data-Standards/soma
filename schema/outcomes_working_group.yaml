  ThreeDCellCulture:
    name: ThreeDCellCulture
    id_prefixes:
    - owg
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/ThreeDCellCulture
    description: Three-dimensional cell culture systems including spheroids, organoids,
      and scaffold-based cultures. Provides enhanced physiological relevance with
      3D architecture.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mappings:
    - NAMO:0000003
    is_a: CellularSystem
    slots:
    - id
    - name
    - description
    - cell_line
    - primary_cell
    - cell_type
    - anatomical_origin
    - cell_culture_growth_mode
    - culture_conditions
    - culture_media
    - model_species
    - three_d_architecture
    - matrix_composition
