  CiliaryFunctionAssay:
    name: CiliaryFunctionAssay
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_microschemas/CiliaryFunctionAssay
    annotations:
      supported_contexts:
        tag: supported_contexts
        value: in_vitro_or_in_vivo
    description: 'Assay for measuring ciliary function including beat frequency, active
      area, cilia morphology, and ciliated cell populations. Informs on Key Event:
      "Decreased ciliary function" in respiratory AOPs.

      CONTEXT: Can be performed in vitro (tissue slices, 2D cell culture, spheroids)
      or in vivo (often using optical coherence tomography).

      TIER 1 slots (critical): beat_frequency_hz, active_area_percentage, cilia_length,
      cilia_per_cell, percentage_ciliated_cells, cell_type_ratios,'
    from_schema: https://w3id.org/EHS-Data-Standards/assay_microschemas
    is_a: Assay
    slots:
    - id
    - name
    - description
    - informs_on_key_event
    - has_exposure_condition
    - follows_protocols
    - assay_date
    - analysis_software
    - airway_region
    - CiliaryFunctionAssay_study_subject
    - CiliaryFunctionAssay_has_specified_output
    slot_usage:
      study_subject:
        name: study_subject
        description: Can be ModelSystem (in vitro - ALI cultures, tissue slices, spheroids)
          or InVivoSubject (in vivo - OCT measurements)
        range: StudySubject
      has_specified_output:
        name: has_specified_output
        range: CiliaryFunctionOutput
    class_uri: assay_microschemas:CiliaryFunctionAssay
  CiliaryFunctionOutput:
    name: CiliaryFunctionOutput
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_microschemas/CiliaryFunctionOutput
    description: Measurement results from a ciliary function assay. Contains the measured
      values for ciliary beat frequency, active area, cilia morphology, and ciliated
      cell populations.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_microschemas
    is_a: AssayOutputMeasurement
    slots:
    - id
    - name
    - description
    - beat_frequency_hz
    - active_area_percentage
    - cilia_length
    - cilia_per_cell
    - percentage_ciliated_cells
    - cell_type_ratios
