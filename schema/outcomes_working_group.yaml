name: outcomes_working_group
description: 'A LinkML data model for representing biological assays, measurements,
  and experimental protocols in the context of outcomes research. The schema is centered
  around ASSAYS that inform on Key Events in Adverse Outcome Pathways (AOPs), with
  named slots for specific measurements.

  This is the main entry point that imports the AOP framework, assay base schema,
  and domain-specific assay microschemas.'
title: Outcomes Working Group Schema
see_also:
- https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group
imports:
- linkml:types
- aop_framework
- assay_base
- assay_microschemas
license: MIT
prefixes:
  outcomes_working_group:
    prefix_prefix: outcomes_working_group
    prefix_reference: https://w3id.org/EHS-Data-Standards/outcomes_working_group/
  aop_framework:
    prefix_prefix: aop_framework
    prefix_reference: https://w3id.org/EHS-Data-Standards/aop_framework/
  assay_base:
    prefix_prefix: assay_base
    prefix_reference: https://w3id.org/EHS-Data-Standards/assay_base/
  assay_microschemas:
    prefix_prefix: assay_microschemas
    prefix_reference: https://w3id.org/EHS-Data-Standards/assay_microschemas/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  biolink:
    prefix_prefix: biolink
    prefix_reference: https://w3id.org/biolink/
  OBI:
    prefix_prefix: OBI
    prefix_reference: http://purl.obolibrary.org/obo/OBI_
  CHEBI:
    prefix_prefix: CHEBI
    prefix_reference: http://purl.obolibrary.org/obo/CHEBI_
  ENVO:
    prefix_prefix: ENVO
    prefix_reference: http://purl.obolibrary.org/obo/ENVO_
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  UO:
    prefix_prefix: UO
    prefix_reference: http://purl.obolibrary.org/obo/UO_
  GO:
    prefix_prefix: GO
    prefix_reference: http://purl.obolibrary.org/obo/GO_
  CL:
    prefix_prefix: CL
    prefix_reference: http://purl.obolibrary.org/obo/CL_
  UBERON:
    prefix_prefix: UBERON
    prefix_reference: http://purl.obolibrary.org/obo/UBERON_
  HP:
    prefix_prefix: HP
    prefix_reference: http://purl.obolibrary.org/obo/HP_
  ECTO:
    prefix_prefix: ECTO
    prefix_reference: http://purl.obolibrary.org/obo/ECTO_
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  UCUM:
    prefix_prefix: UCUM
    prefix_reference: http://unitsofmeasure.org/
  QUDT:
    prefix_prefix: QUDT
    prefix_reference: http://qudt.org/vocab/unit/
  owg:
    prefix_prefix: owg
    prefix_reference: https://w3id.org/EHS-Data-Standards/outcomes-working-group/
default_prefix: outcomes_working_group
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  BiologicalActionEnum:
    name: BiologicalActionEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/BiologicalActionEnum
    description: Types of biological changes or actions in key events.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    permissible_values:
      increased:
        text: increased
        description: Increased level or activity
      decreased:
        text: decreased
        description: Decreased level or activity
      altered:
        text: altered
        description: Altered function or state (not quantitative)
      impaired:
        text: impaired
        description: Impaired function
      disrupted:
        text: disrupted
        description: Disrupted process or structure
      activated:
        text: activated
        description: Activated process or pathway
      inhibited:
        text: inhibited
        description: Inhibited process or pathway
  BiologicalOrganizationLevelEnum:
    name: BiologicalOrganizationLevelEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/BiologicalOrganizationLevelEnum
    description: Levels of biological organization for key events.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    permissible_values:
      molecular:
        text: molecular
        description: Molecular level (genes, proteins, metabolites)
      cellular:
        text: cellular
        description: Cellular level (cell function, signaling)
      tissue:
        text: tissue
        description: Tissue level (tissue structure, function)
      organ:
        text: organ
        description: Organ level (organ function)
      organism:
        text: organism
        description: Whole organism level (systemic effects)
      population:
        text: population
        description: Population level (ecological effects)
  EvidenceSupportEnum:
    name: EvidenceSupportEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/EvidenceSupportEnum
    description: Levels of evidence support for key event relationships.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    permissible_values:
      strong:
        text: strong
        description: Strong empirical support with mechanistic understanding
      moderate:
        text: moderate
        description: Moderate support with some mechanistic evidence
      weak:
        text: weak
        description: Limited evidence or indirect support
      not_specified:
        text: not_specified
        description: Evidence level not specified
  QuantitativeUnderstandingEnum:
    name: QuantitativeUnderstandingEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/QuantitativeUnderstandingEnum
    description: Levels of quantitative understanding for key event relationships.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    permissible_values:
      high:
        text: high
        description: Response-response relationship well characterized
      moderate:
        text: moderate
        description: Some quantitative data available
      low:
        text: low
        description: Limited quantitative understanding
      not_specified:
        text: not_specified
        description: Quantitative understanding not specified
  OutcomeLevelEnum:
    name: OutcomeLevelEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/OutcomeLevelEnum
    description: Levels at which adverse outcomes manifest.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    permissible_values:
      individual:
        text: individual
        description: Adverse outcome in an individual organism
      population:
        text: population
        description: Adverse outcome at the population level
  SampleTypeEnum:
    name: SampleTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/SampleTypeEnum
    description: Types of biological samples for in vivo assays.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      urine:
        text: urine
        description: Urine sample
      blood:
        text: blood
        description: Blood sample
      sputum:
        text: sputum
        description: Induced or spontaneous sputum
      balf:
        text: balf
        description: Bronchoalveolar lavage fluid
      nasal_epithelium:
        text: nasal_epithelium
        description: Nasal epithelial sample
      bronchial_epithelium:
        text: bronchial_epithelium
        description: Bronchial epithelial sample
      exhaled_breath_condensate:
        text: exhaled_breath_condensate
        description: Exhaled breath condensate
      biopsy:
        text: biopsy
        description: Tissue biopsy
      sweat:
        text: sweat
        description: Sweat sample
  CellCultureGrowthModeEnum:
    name: CellCultureGrowthModeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/CellCultureGrowthModeEnum
    description: Cell culture growth modes.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      adherent:
        text: adherent
        description: Cells grow attached to a surface
        meaning: CLO:0000028
      suspension:
        text: suspension
        description: Cells grow suspended in culture medium
        meaning: CLO:0000029
      air_liquid_interface:
        text: air_liquid_interface
        description: Cells cultured at air-liquid interface (ALI)
        meaning: OBI:0600047
      three_dimensional:
        text: three_dimensional
        description: Cells grown in 3D matrix or scaffold
      organoid:
        text: organoid
        description: Self-organizing 3D tissue culture
      spheroid:
        text: spheroid
        description: Spherical cellular aggregates
  SubstrateTypeEnum:
    name: SubstrateTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/SubstrateTypeEnum
    description: Types of cell culture substrates.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      plastic:
        text: plastic
        description: Standard tissue culture-treated plastic
      collagen_coated:
        text: collagen_coated
        description: Collagen-coated surface
      matrigel:
        text: matrigel
        description: Basement membrane matrix
      fibronectin_coated:
        text: fibronectin_coated
        description: Fibronectin-coated surface
      laminin_coated:
        text: laminin_coated
        description: Laminin-coated surface
      transwell_insert:
        text: transwell_insert
        description: Permeable support for ALI culture
      hydrogel:
        text: hydrogel
        description: Three-dimensional hydrogel matrix
      glass:
        text: glass
        description: Glass surface or coverslip
      pdms:
        text: pdms
        description: Polydimethylsiloxane (microfluidics)
  ThreeDArchitectureEnum:
    name: ThreeDArchitectureEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/ThreeDArchitectureEnum
    description: Types of 3D cell culture architecture.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      spheroid:
        text: spheroid
        description: Spherical cellular aggregates
      organoid:
        text: organoid
        description: Self-organizing 3D tissue culture
      scaffold_based:
        text: scaffold_based
        description: Cells grown on a 3D scaffold
      hydrogel_embedded:
        text: hydrogel_embedded
        description: Cells embedded within a hydrogel matrix
      hanging_drop:
        text: hanging_drop
        description: 3D cultures formed by hanging drop method
  CoCultureConfigurationEnum:
    name: CoCultureConfigurationEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/CoCultureConfigurationEnum
    description: Physical configurations for co-culture systems.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      direct_contact:
        text: direct_contact
        description: Cell types in direct physical contact
      transwell:
        text: transwell
        description: Cell types separated by transwell membrane
      microfluidic:
        text: microfluidic
        description: Cell types connected via microfluidic channels
      conditioned_medium:
        text: conditioned_medium
        description: Cells grown in medium conditioned by another cell type
      mixed:
        text: mixed
        description: Multiple cell types mixed together
  SupplementTypeEnum:
    name: SupplementTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/SupplementTypeEnum
    description: Categories of cell culture medium supplements.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      growth_factor:
        text: growth_factor
        description: Proteins that stimulate cell growth
        meaning: CHEBI:23924
      antibiotic:
        text: antibiotic
        description: Antimicrobial substances
        meaning: CHEBI:33281
      antifungal:
        text: antifungal
        description: Antifungal agents
        meaning: CHEBI:35718
      hormone:
        text: hormone
        description: Signaling molecules
        meaning: CHEBI:24621
      vitamin:
        text: vitamin
        description: Essential vitamins
        meaning: CHEBI:33229
      amino_acid:
        text: amino_acid
        description: Amino acid supplements
        meaning: CHEBI:33709
      lipid:
        text: lipid
        description: Lipid supplements
        meaning: CHEBI:18059
      trace_element:
        text: trace_element
        description: Essential trace elements
      attachment_factor:
        text: attachment_factor
        description: Factors promoting cell attachment
      differentiation_factor:
        text: differentiation_factor
        description: Factors promoting cell differentiation
  AssayContextCapabilityEnum:
    name: AssayContextCapabilityEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/AssayContextCapabilityEnum
    description: Indicates what experimental contexts an assay class supports. Used
      to constrain valid study_subject types and enable context-appropriate slots.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    permissible_values:
      in_vitro_only:
        text: in_vitro_only
        description: Assay can only be performed in vitro (cell cultures, tissue slices,
          organoids, etc.)
      in_vivo_only:
        text: in_vivo_only
        description: Assay can only be performed in vivo (requires samples from or
          measurements on living human or animal subjects)
      in_vitro_or_in_vivo:
        text: in_vitro_or_in_vivo
        description: Assay can be performed in either in vitro or in vivo contexts
          depending on the experimental design
  CiliaryMotionPatternEnum:
    name: CiliaryMotionPatternEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_microschemas/CiliaryMotionPatternEnum
    description: Patterns of ciliary motion.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_microschemas
    permissible_values:
      coordinated:
        text: coordinated
        description: Normal coordinated beating pattern
      dyskinetic:
        text: dyskinetic
        description: Abnormal dyskinetic motion
      immotile:
        text: immotile
        description: Non-motile/static cilia
      rotational:
        text: rotational
        description: Rotational motion pattern
      stiff:
        text: stiff
        description: Stiff/rigid beating
  DirectionalityEnum:
    name: DirectionalityEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_microschemas/DirectionalityEnum
    description: Directionality of mucociliary transport.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_microschemas
    permissible_values:
      normal:
        text: normal
        description: Normal directed transport
      reversed:
        text: reversed
        description: Reversed transport direction
      absent:
        text: absent
        description: No directed transport
      variable:
        text: variable
        description: Variable/inconsistent direction
slots:
  adverse_outcome_pathways:
    name: adverse_outcome_pathways
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes_working_group/adverse_outcome_pathways
    description: Collection of Adverse Outcome Pathways. AOPs describe sequences of
      causally linked events from molecular initiating events to adverse outcomes.
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slot_uri: outcomes_working_group:adverse_outcome_pathways
    owner: Container
    domain_of:
    - Container
    range: AdverseOutcomePathway
    multivalued: true
    inlined: true
    inlined_as_list: true
  ciliary_function_assays:
    name: ciliary_function_assays
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes_working_group/ciliary_function_assays
    description: 'Collection of ciliary function assays. Informs on Key Event: "Decreased
      ciliary function". Contains named slots for beat frequency, active area, cilia
      length, etc.'
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slot_uri: outcomes_working_group:ciliary_function_assays
    owner: Container
    domain_of:
    - Container
    range: CiliaryFunctionAssay
    multivalued: true
    inlined: true
    inlined_as_list: true
  asl_assays:
    name: asl_assays
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes_working_group/asl_assays
