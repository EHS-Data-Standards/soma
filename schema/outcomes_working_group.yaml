    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    mappings:
    - fhir:Quantity
    slots:
    - quantityValue__unit
    - quantityValue__value
    attributes:
      unit:
        name: unit
        description: The unit of measurement
        range: Unit
        inlined: true
