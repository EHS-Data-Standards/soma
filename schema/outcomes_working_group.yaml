classes:
  Container:
    name: Container
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes_working_group/Container
    description: A container for collections of measurements and related entities.
      Used as the root class for data validation.
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slots:
    - ciliary_measurements
    - asl_measurements
    - mcc_measurements
    - oxidative_stress_measurements
    - cftr_measurements
    - egfr_phosphorylation_measurements
    - goblet_cell_mucin_measurements
    - balf_sputum_measurements
    - lung_function_measurements
    - foxj_measurements
    - protocols
    - methods
    - assays
    class_uri: outcomes_working_group:Container
    tree_root: true
  Measurement:
    name: Measurement
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/Measurement
    description: The result of applying an assay to a specific sample at a specific
      time, producing a value (or values). This is the interface that domain-specific
      measurement microschemas implement.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mixin: true
    slots:
    - id
    - name
    - description
    - observation_type
    - quantity_measured
    - range_low
    - range_high
    - measured_entity
    - measurement_date
    - uses_method
    - follows_protocol
    class_uri: measurement_base:Measurement
  Assay:
    name: Assay
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/Assay
    description: A test or experiment used to measure a specific biological or chemical
      activity; assays generate data on how a substance affects cells, tissues, or
      systems.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    slots:
    - id
    - name
    - description
    class_uri: measurement_base:Assay
  Method:
    name: Method
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/Method
    description: A general approach or technique used to collect, measure, or analyze
      data (e.g., qPCR, RNA-Seq, high-speed video microscopy, ELISA).
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    slots:
    - id
    - name
    - description
    - implements_assay
    class_uri: measurement_base:Method
  Protocol:
    name: Protocol
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/Protocol
    description: A detailed set of steps for how to perform a test or collect data;
      protocols ensure consistency across laboratories or studies when generating
      exposure or biological data.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mappings:
    - OBI:0000272
    slots:
    - id
    - name
    - description
    - specified_by_method
    class_uri: OBI:0000272
  InVitroContext:
    name: InVitroContext
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/InVitroContext
    description: Context slots for in vitro measurements using cell culture systems.
      Mix this into microschemas that can be performed on cultured cells. The cell_culture_system
      slot provides a rich reference to the full CellularSystem model (TwoDCellCulture,
      ThreeDCellCulture, or CoCulture).
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mixin: true
    slots:
    - cell_culture_system
    - days_at_differentiation
    - donor_info
    - replicates_per_donor
    class_uri: measurement_base:InVitroContext
  InVivoContext:
    name: InVivoContext
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/InVivoContext
    description: Context slots for in vivo measurements from human or animal subjects.
      Mix this into microschemas that can be performed on living subjects.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mixin: true
    slots:
    - participant
    - sample_type
    - collection_site
    - collection_date
    - subject_characteristics
    class_uri: measurement_base:InVivoContext
  QuantityValue:
    name: QuantityValue
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/QuantityValue
    description: A quantity with a numeric value and unit of measurement.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    slots:
    - value
    - unit
    class_uri: measurement_base:QuantityValue
  Unit:
    name: Unit
    id_prefixes:
    - UO
    - UCUM
    - QUDT
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/Unit
    description: A unit of measurement from a standard ontology (UO, UCUM, QUDT).
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    slots:
    - id
    - name
    class_uri: measurement_base:Unit
  NamedEntity:
    name: NamedEntity
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/NamedEntity
    description: A reference to an entity with an identifier and name. Used for measured_entity,
      participant, etc.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    slots:
    - id
    - name
    class_uri: measurement_base:NamedEntity
  CellLine:
    name: CellLine
    id_prefixes:
    - CLO
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CellLine
    description: A cell line - a genetically stable cultured cell population that
      contains individual cell line cells. Reference to a specific cell line with
      identifiers from cell line repositories.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    is_a: NamedEntity
    slots:
    - id
    - name
    - description
    - cell_type
    - model_species
    - tissue_origin
    - disease_state
    - supplier
    - catalog_number
    - authentication_method
    - mycoplasma_status
    class_uri: measurement_base:CellLine
  CellCultureConditions:
    name: CellCultureConditions
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CellCultureConditions
    description: Detailed cell culture parameters including medium, environment, and
      timing.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    exact_mappings:
    - CLO:0037334
    is_a: NamedEntity
    slots:
    - id
    - name
    - culture_media
    - days_at_air_liquid_interface
    - passage_number
    - substrate_type
    - cell_culture_growth_mode
    - donor_count
    - replicates_per_donor
    class_uri: measurement_base:CellCultureConditions
  CellCultureMedium:
    name: CellCultureMedium
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CellCultureMedium
    description: Detailed formulation of cell culture medium including base medium
      and supplements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    is_a: NamedEntity
    slots:
    - id
    - name
    - base_medium
    - serum_type
    - serum_concentration
    - supplements
    - osmolality
    - manufacturer
    - catalog_number
    - lot_number
    - preparation_date
    class_uri: measurement_base:CellCultureMedium
  MediumSupplement:
    name: MediumSupplement
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/MediumSupplement
    description: Supplement or additive to cell culture medium.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    is_a: NamedEntity
    slots:
    - id
    - name
    - supplement_type
    - concentration
    - manufacturer
    - catalog_number
    class_uri: measurement_base:MediumSupplement
  CellularSystem:
    name: CellularSystem
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CellularSystem
    description: Cell-based model systems that use living cells to model biological
      processes. Includes 2D cultures, 3D systems, and co-cultures. Abstract base
      class for specific culture types.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    is_a: NamedEntity
    abstract: true
    slots:
    - id
    - name
    - description
    - cell_line
    - primary_cell
    - cell_type
    - anatomical_origin
    - cell_culture_growth_mode
    - culture_conditions
    - culture_media
    - model_species
    class_uri: measurement_base:CellularSystem
  TwoDCellCulture:
    name: TwoDCellCulture
    id_prefixes:
    - owg
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/TwoDCellCulture
    description: Conventional monolayer cell cultures grown on flat surfaces. Includes
      adherent and suspension cultures in standard tissue culture vessels.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    mappings:
    - NAMO:0000002
    is_a: CellularSystem
    slots:
    - id
    - name
    - description
    - cell_line
    - primary_cell
    - cell_type
    - anatomical_origin
    - cell_culture_growth_mode
    - culture_conditions
    - culture_media
    - model_species
    - substrate_type
    - confluence_level
    - passage_number
    - seeding_density
