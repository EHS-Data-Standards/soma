    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slots:
    - studies
    - cohorts
    - participants
    - exposure_measurements
    - biomarker_measurements
    - phenotype_measurements
    - aggregated_measurements
    - gene_expression_measurements
    - protein_expression_measurements
    - chemical_exposures
    - dietary_exposures
    - environmental_exposures
    - occupational_exposures
    - phenotypes
    - diseases
    - adverse_outcomes
    - adverse_outcome_pathways
    - genes
    - proteins
    - cell_types
    - anatomical_entities
    - organisms
    - exposure_to_phenotype_associations
    - states
    - public_use_microdata_areas
    - counties
    - census_tracts
    - block_groups
    - households
    - persons
    - schools
    - cellular_systems
    - two_d_cell_cultures
    - three_d_cell_cultures
    - co_cultures
    - cell_lines
    - environmental_measurements
    - mechanical_measurements
    - in_vitro_exposures
    - exposure_materials
    - particle_properties_collection
    - aerosol_generations
    - sample_preparations
    - analyses
    class_uri: owg:Container
    tree_root: true
