      Informs on Key Event: "EGFR activation" in mucus hypersecretion AOPs.

      IMPORTANT: EGFR phosphorylation is the MOST SPECIFIC evidence for activation.
      Downstream kinase data alone is insufficient - needs phosphorylation measure
      OR inhibitor reversal for strong evidence. Cell type matters due to receptor
      location in ALI cultures.

      TIER 1 slots (critical): egfr_phosphorylation with site specification.'
