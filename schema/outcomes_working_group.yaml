name: outcomes_working_group
description: A LinkML data model for representing biological measurements, assays,
  and experimental protocols in the context of outcomes research. This is the main
  entry point that imports the measurement base schema and domain-specific microschemas.
title: Outcomes Working Group Schema
see_also:
- https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group
imports:
- linkml:types
- measurement_base
- measurement_microschemas
license: MIT
prefixes:
  outcomes_working_group:
    prefix_prefix: outcomes_working_group
    prefix_reference: https://w3id.org/EHS-Data-Standards/outcomes_working_group/
  measurement_base:
    prefix_prefix: measurement_base
    prefix_reference: https://w3id.org/EHS-Data-Standards/measurement_base/
  measurement_microschemas:
    prefix_prefix: measurement_microschemas
    prefix_reference: https://w3id.org/EHS-Data-Standards/measurement_microschemas/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  biolink:
    prefix_prefix: biolink
    prefix_reference: https://w3id.org/biolink/
  OBI:
    prefix_prefix: OBI
    prefix_reference: http://purl.obolibrary.org/obo/OBI_
  CHEBI:
    prefix_prefix: CHEBI
    prefix_reference: http://purl.obolibrary.org/obo/CHEBI_
  ENVO:
    prefix_prefix: ENVO
    prefix_reference: http://purl.obolibrary.org/obo/ENVO_
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  UO:
    prefix_prefix: UO
    prefix_reference: http://purl.obolibrary.org/obo/UO_
  GO:
    prefix_prefix: GO
    prefix_reference: http://purl.obolibrary.org/obo/GO_
  CL:
    prefix_prefix: CL
    prefix_reference: http://purl.obolibrary.org/obo/CL_
  HP:
    prefix_prefix: HP
    prefix_reference: http://purl.obolibrary.org/obo/HP_
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
default_prefix: outcomes_working_group
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  StudyContextEnum:
    name: StudyContextEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/StudyContextEnum
    description: The experimental context for a protocol or measurement.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      in_vitro:
        text: in_vitro
        description: Performed on cultured cells or tissues
      in_vivo:
        text: in_vivo
        description: Performed on living human or animal subjects
      ex_vivo:
        text: ex_vivo
        description: Performed on tissue removed from an organism
  SampleTypeEnum:
    name: SampleTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/SampleTypeEnum
    description: Types of biological samples for in vivo measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      urine:
        text: urine
        description: Urine sample
      blood:
        text: blood
        description: Blood sample (whole blood, serum, or plasma)
      sputum:
        text: sputum
        description: Induced or spontaneous sputum
      balf:
        text: balf
        description: Bronchoalveolar lavage fluid
      nasal_epithelium:
        text: nasal_epithelium
        description: Nasal epithelial sample
      bronchial_epithelium:
        text: bronchial_epithelium
        description: Bronchial epithelial sample
      exhaled_breath_condensate:
        text: exhaled_breath_condensate
        description: Exhaled breath condensate (EBC)
      biopsy:
        text: biopsy
        description: Tissue biopsy
      sweat:
        text: sweat
        description: Sweat sample (e.g., for sweat chloride test)
  CellCultureGrowthModeEnum:
    name: CellCultureGrowthModeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CellCultureGrowthModeEnum
    description: Cell culture growth modes including traditional and advanced systems.
      Based on CLO cell culture growth mode terms.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      adherent:
        text: adherent
        description: Cells grow attached to a surface
        meaning: CLO:0000028
      suspension:
        text: suspension
        description: Cells grow suspended in culture medium
        meaning: CLO:0000029
      air_liquid_interface:
        text: air_liquid_interface
        description: Cells cultured at interface between air and liquid medium (ALI)
        meaning: OBI:0600047
      three_dimensional:
        text: three_dimensional
        description: Cells grown in 3D matrix or scaffold
      organoid:
        text: organoid
        description: Self-organizing 3D tissue culture from stem cells
      spheroid:
        text: spheroid
        description: Spherical cellular aggregates formed by self-aggregation
  SubstrateTypeEnum:
    name: SubstrateTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/SubstrateTypeEnum
    description: Types of cell culture substrates and surfaces. Includes traditional
      and advanced substrate materials.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      plastic:
        text: plastic
        description: Standard tissue culture-treated plastic
        broad_mappings:
        - OBI:0000953
      collagen_coated:
        text: collagen_coated
        description: Collagen-coated surface for enhanced cell attachment
        related_mappings:
        - CHEBI:3815
        broad_mappings:
        - OBI:0100031
      matrigel:
        text: matrigel
        description: Basement membrane matrix (Matrigel/Geltrex)
        related_mappings:
        - GO:0005604
        narrow_mappings:
        - OBI:0100031
      fibronectin_coated:
        text: fibronectin_coated
        description: Fibronectin-coated surface
        related_mappings:
        - PR:000007245
        broad_mappings:
        - OBI:0100031
      laminin_coated:
        text: laminin_coated
        description: Laminin-coated surface
        related_mappings:
        - GO:0043256
        broad_mappings:
        - OBI:0100031
      transwell_insert:
        text: transwell_insert
        description: Permeable support for air-liquid interface culture
        exact_mappings:
        - OBI:0001950
      hydrogel:
        text: hydrogel
        description: Three-dimensional hydrogel matrix
        exact_mappings:
        - CHEBI:17790
      glass:
        text: glass
        description: Glass surface or coverslip
        exact_mappings:
        - CHEBI:131189
      pdms:
        text: pdms
        description: Polydimethylsiloxane (for microfluidics/organ-on-chip)
        broad_mappings:
        - CHEBI:46669
  ThreeDArchitectureEnum:
    name: ThreeDArchitectureEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/ThreeDArchitectureEnum
    description: Types of 3D cell culture architecture.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      spheroid:
        text: spheroid
        description: Spherical cellular aggregates formed by self-aggregation
      organoid:
        text: organoid
        description: Self-organizing 3D tissue culture from stem cells
      scaffold_based:
        text: scaffold_based
        description: Cells grown on a 3D scaffold structure
      hydrogel_embedded:
        text: hydrogel_embedded
        description: Cells embedded within a hydrogel matrix
      hanging_drop:
        text: hanging_drop
        description: 3D cultures formed by hanging drop method
  CoCultureConfigurationEnum:
    name: CoCultureConfigurationEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/CoCultureConfigurationEnum
    description: Physical configurations for co-culture systems.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      direct_contact:
        text: direct_contact
        description: Cell types in direct physical contact
      transwell:
        text: transwell
        description: Cell types separated by transwell insert membrane
      microfluidic:
        text: microfluidic
        description: Cell types connected via microfluidic channels
      conditioned_medium:
        text: conditioned_medium
        description: Cells grown in medium conditioned by another cell type
      mixed:
        text: mixed
        description: Multiple cell types mixed together in culture
  SupplementTypeEnum:
    name: SupplementTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_base/SupplementTypeEnum
    description: Categories of cell culture medium supplements and additives.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_base
    permissible_values:
      growth_factor:
        text: growth_factor
        description: Proteins that stimulate cell growth, proliferation, and differentiation
        meaning: CHEBI:23924
      antibiotic:
        text: antibiotic
        description: Antimicrobial substances used to prevent bacterial contamination
        meaning: CHEBI:33281
      antifungal:
        text: antifungal
        description: Antifungal agents to prevent fungal contamination
        meaning: CHEBI:35718
      hormone:
        text: hormone
        description: Signaling molecules that regulate cell physiology
        meaning: CHEBI:24621
      vitamin:
        text: vitamin
        description: Organic compounds essential for normal growth and nutrition
        meaning: CHEBI:33229
      amino_acid:
        text: amino_acid
        description: Amino acid supplements
        meaning: CHEBI:33709
      lipid:
        text: lipid
        description: Lipid supplements for cell membrane synthesis
        meaning: CHEBI:18059
      trace_element:
        text: trace_element
        description: Essential trace elements and minerals
      attachment_factor:
        text: attachment_factor
        description: Factors that promote cell attachment to substrate
      differentiation_factor:
        text: differentiation_factor
        description: Factors that promote cell differentiation
  CiliaryFunctionObservationTypeEnum:
    name: CiliaryFunctionObservationTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_microschemas/CiliaryFunctionObservationTypeEnum
    description: Observation types for ciliary function measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_microschemas
    permissible_values:
      ciliary_beat_frequency:
        text: ciliary_beat_frequency
        description: Ciliary beat frequency (Hz)
        meaning: GO:0003341
      ciliary_active_area_percentage:
        text: ciliary_active_area_percentage
        description: Percentage of epithelial surface with actively beating cilia
      cilia_length:
        text: cilia_length
        description: "Length of cilia (\u03BCm)"
      cilia_per_cell:
        text: cilia_per_cell
        description: Number of cilia per cell
      percentage_ciliated_cells:
        text: percentage_ciliated_cells
        description: Percentage of cells that are ciliated
      ciliary_motion_pattern:
        text: ciliary_motion_pattern
        description: Pattern of ciliary motion (coordinated, dyskinetic, immotile)
      ciliary_beat_amplitude:
        text: ciliary_beat_amplitude
        description: Amplitude of ciliary beat stroke
      cell_type_ratios:
        text: cell_type_ratios
        description: Ratios between different cell types (e.g., ciliated to goblet
          cell ratio)
  ASLObservationTypeEnum:
    name: ASLObservationTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_microschemas/ASLObservationTypeEnum
    description: Observation types for airway surface liquid measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_microschemas
    permissible_values:
      asl_height:
        text: asl_height
        description: "Airway surface liquid height/depth (\u03BCm)"
      periciliary_layer_depth:
        text: periciliary_layer_depth
        description: "Periciliary layer (PCL) depth (\u03BCm)"
      mucus_layer_thickness:
        text: mucus_layer_thickness
        description: "Thickness of the mucus gel layer (\u03BCm)"
      asl_chloride_concentration:
        text: asl_chloride_concentration
        description: Chloride ion concentration in ASL
      asl_sodium_concentration:
        text: asl_sodium_concentration
        description: Sodium ion concentration in ASL
      asl_potassium_concentration:
        text: asl_potassium_concentration
        description: Potassium ion concentration in ASL
      asl_ph:
        text: asl_ph
        description: pH of airway surface liquid
  MCCObservationTypeEnum:
    name: MCCObservationTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_microschemas/MCCObservationTypeEnum
    description: Observation types for mucociliary clearance measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_microschemas
    permissible_values:
      mucociliary_transport_rate:
        text: mucociliary_transport_rate
        description: "Rate of mucus/particle transport (mm/min or \u03BCm/s)"
        meaning: GO:0120197
      transport_directionality:
        text: transport_directionality
        description: Directionality of mucociliary transport
      percentage_active_transport:
        text: percentage_active_transport
        description: Percentage of surface with active mucociliary transport
      particle_clearance_time:
        text: particle_clearance_time
        description: Time to clear particles from a defined region
      biofilm_clearance_rate:
        text: biofilm_clearance_rate
        description: Rate of bacterial biofilm clearance
      bacterial_load:
        text: bacterial_load
        description: Bacterial load remaining after clearance (CFU)
  OxidativeStressObservationTypeEnum:
    name: OxidativeStressObservationTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_microschemas/OxidativeStressObservationTypeEnum
    description: Observation types for oxidative stress measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_microschemas
    permissible_values:
      reactive_oxygen_species:
        text: reactive_oxygen_species
        description: Reactive oxygen species level (fluorescence intensity or fold
          change)
        meaning: CHEBI:26523
      malondialdehyde:
        text: malondialdehyde
        description: Malondialdehyde (MDA) level - lipid peroxidation marker
        meaning: CHEBI:16213
      four_hydroxynonenal:
        text: four_hydroxynonenal
        description: 4-Hydroxynonenal (4-HNE) level - lipid peroxidation marker
        meaning: CHEBI:58968
      eight_isoprostane:
        text: eight_isoprostane
        description: 8-Isoprostane level - lipid peroxidation marker
      protein_carbonyl:
        text: protein_carbonyl
        description: Protein carbonyl content - protein oxidation marker
      nitrotyrosine:
        text: nitrotyrosine
        description: Nitrotyrosine level - protein nitration marker
      eight_ohdg:
        text: eight_ohdg
        description: 8-OHdG level - DNA oxidation marker
      glutathione_ratio:
        text: glutathione_ratio
        description: GSH/GSSG ratio - antioxidant capacity
      superoxide_dismutase_activity:
        text: superoxide_dismutase_activity
        description: Superoxide dismutase (SOD) enzyme activity
      catalase_activity:
        text: catalase_activity
        description: Catalase enzyme activity
      glutathione_peroxidase_activity:
        text: glutathione_peroxidase_activity
        description: Glutathione peroxidase (GPx) enzyme activity
      total_antioxidant_capacity:
        text: total_antioxidant_capacity
        description: Total antioxidant capacity of sample
      nrf2_activation:
        text: nrf2_activation
        description: NRF2 pathway activation level
  CFTRObservationTypeEnum:
    name: CFTRObservationTypeEnum
    definition_uri: https://w3id.org/EHS-Data-Standards/measurement_microschemas/CFTRObservationTypeEnum
    description: Observation types for CFTR function measurements.
    from_schema: https://w3id.org/EHS-Data-Standards/measurement_microschemas
    permissible_values:
      cftr_chloride_secretion:
        text: cftr_chloride_secretion
        description: "CFTR-mediated chloride secretory current (\u03BCA/cm\xB2)"
      cftr_forskolin_response:
        text: cftr_forskolin_response
        description: CFTR response to forskolin stimulation
      cftr_inhibitor_sensitive_current:
