    name: NamedThing
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes-working-group/NamedThing
    description: A generic grouping for any identifiable entity in the exposome
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slots:
    - id
    - name
    - description
    - category
    - xref
    class_uri: owg:NamedThing
  Unit:
    name: Unit
    id_prefixes:
    - UO
    - UCUM
    - qudt
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes-working-group/Unit
    description: A unit of measurement from a standard ontology (UO, UCUM, QUDT)
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - category
    - xref
    - unit_label
    class_uri: owg:Unit
  QuantityValue:
    name: QuantityValue
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes-working-group/QuantityValue
