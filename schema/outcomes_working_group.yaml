classes:
  Container:
    name: Container
    definition_uri: https://w3id.org/EHS-Data-Standards/outcomes_working_group/Container
    description: 'Root container for outcomes research data. Organized around ASSAYS
      that inform on Key Events in Adverse Outcome Pathways (AOPs).

      The schema is assay-centric: each assay class contains named slots for its specific
      measurements, with an explicit connection to the Key Event it informs via the
      informs_on_key_event slot.'
    from_schema: https://w3id.org/EHS-Data-Standards/outcomes_working_group
    slots:
    - key_events
    - adverse_outcome_pathways
    - ciliary_function_assays
    - asl_assays
    - mcc_assays
    - oxidative_stress_assays
    - cftr_assays
    - egfr_signaling_assays
    - goblet_cell_assays
    - balf_sputum_assays
    - lung_function_assays
    - foxj_assays
    - gene_expression_assays
    - protocols
    class_uri: outcomes_working_group:Container
    tree_root: true
  NamedThing:
    name: NamedThing
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/NamedThing
    description: A generic entity with an identifier and name. Base class for all
      named entities in the schema.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    slots:
    - id
    - name
    - description
    class_uri: aop_framework:NamedThing
  KeyEvent:
    name: KeyEvent
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/KeyEvent
    description: A measurable change in biological state that is a step in an Adverse
      Outcome Pathway. Key Events represent the biological perturbations that assays
      measure to provide evidence for AOP-based mechanistic understanding. Key events
      can be Molecular Initiating Events (MIEs), intermediate Key Events, or Adverse
      Outcomes at the organism/population level.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    mappings:
    - ECTO:1000000
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - biological_process
    - biological_object
    - biological_action
    - level_of_biological_organization
    - occurs_in_cell_type
    - occurs_in_anatomy
    - aopwiki_id
    - upstream_key_events
    - downstream_key_events
    class_uri: ECTO:1000000
  KeyEventRelationship:
    name: KeyEventRelationship
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/KeyEventRelationship
    description: A directional relationship between two key events in an AOP. Represents
      the causal linkage between an upstream event and a downstream event with supporting
      evidence.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - upstream_event
    - downstream_event
    - relationship_type
    - evidence_support
    - quantitative_understanding
    class_uri: aop_framework:KeyEventRelationship
  AdverseOutcome:
    name: AdverseOutcome
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/AdverseOutcome
    description: An adverse health outcome at the organism or population level that
      represents the apical endpoint of an Adverse Outcome Pathway. This is the final,
      clinically or ecologically relevant effect.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - outcome_level
    - biological_process
    - occurs_in_anatomy
    - aopwiki_id
    class_uri: aop_framework:AdverseOutcome
  AdverseOutcomePathway:
    name: AdverseOutcomePathway
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/AdverseOutcomePathway
    description: A sequence of causally linked events at different levels of biological
      organization that lead from a molecular initiating event through intermediate
      key events to an adverse health outcome. AOPs provide a structured framework
      for organizing mechanistic evidence.
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - aopwiki_id
    - molecular_initiating_event
    - key_events
    - key_event_relationships
    - adverse_outcome
    - stressors
    class_uri: aop_framework:AdverseOutcomePathway
  MolecularInitiatingEvent:
    name: MolecularInitiatingEvent
    definition_uri: https://w3id.org/EHS-Data-Standards/aop_framework/MolecularInitiatingEvent
    description: The initial molecular-level perturbation that starts an Adverse Outcome
      Pathway. The MIE is the direct interaction between a stressor and a biological
      target (e.g., receptor binding, enzyme inhibition).
    from_schema: https://w3id.org/EHS-Data-Standards/aop_framework
    is_a: KeyEvent
    slots:
    - id
    - name
    - description
    - biological_process
    - biological_object
    - biological_action
    - level_of_biological_organization
    - occurs_in_cell_type
    - occurs_in_anatomy
    - aopwiki_id
    - upstream_key_events
    - downstream_key_events
    - target_molecule
    class_uri: aop_framework:MolecularInitiatingEvent
  Assay:
    name: Assay
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/Assay
    description: A planned process with the objective to produce information about
      biological state relevant to a Key Event in an Adverse Outcome Pathway. Assays
      are organized by the functional domain they assess (e.g., ciliary function,
      oxidative stress), and each domain-specific assay class contains named slots
      for the specific measurements it can produce. Assays inform on key events and
      contain the measurement data as named slots.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    mappings:
    - OBI:0000070
    is_a: NamedThing
    abstract: true
    slots:
    - id
    - name
    - description
    - informs_on_key_event
    - study_subject
    - has_exposure_condition
    - follows_protocols
    - has_specified_output
    - assay_date
    class_uri: OBI:0000070
  AssayOutputMeasurement:
    name: AssayOutputMeasurement
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/AssayOutputMeasurement
    description: 'The measurement results produced by an assay. The specified output
      of a planned process. Each domain-specific assay class has a corresponding AssayOutputMeasurement
      subclass containing the named measurement slots for that assay type. This class
      represents the "output" in the Input/Process/Output model: what was measured
      and what values were obtained.'
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    exact_mappings:
    - IAO:0000109
    is_a: NamedThing
    abstract: true
    slots:
    - id
    - name
    - description
    class_uri: assay_base:AssayOutputMeasurement
  StudySubject:
    name: StudySubject
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/StudySubject
    description: "The subject of a study \u2014 what the assay is performed on. Subclasses\
      \ capture different experimental contexts (model systems, living subjects, populations)\
      \ with context-appropriate slots. The type of subject determines which slots\
      \ are available, replacing the old mixin pattern."
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - subject_type
    - model_species
    class_uri: assay_base:StudySubject
  ModelSystem:
    name: ModelSystem
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/ModelSystem
    description: An in vitro or ex vivo model system used to study biological processes.
      Parent class for cell-based and other model systems.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: StudySubject
    slots:
    - id
    - name
    - description
    - subject_type
    - model_species
    class_uri: assay_base:ModelSystem
  InVivoSubject:
    name: InVivoSubject
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/InVivoSubject
    description: A living human or animal subject from whom measurements are taken.
      Used for clinical assays (lung function, BALF/sputum) and any assay performed
      on living subjects.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: StudySubject
    slots:
    - id
    - name
    - description
    - subject_type
    - model_species
    - age
    - sex
    - subject_characteristics
    - disease_state
    - sample_type
    - collection_site
    - collection_date
    - sample_collection_method
    - clinical_context
    class_uri: assay_base:InVivoSubject
  PopulationSubject:
    name: PopulationSubject
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/PopulationSubject
    description: A population or cohort of subjects studied in aggregate. Used for
      epidemiological or population-level analyses. Can optionally hold references
      to individual InVivoSubject members.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: StudySubject
    slots:
    - id
    - name
    - description
    - subject_type
    - model_species
    - cohort_size
    - inclusion_criteria
    - age_range
    - subjects
    class_uri: assay_base:PopulationSubject
  Protocol:
    name: Protocol
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/Protocol
    description: A detailed set of steps for how to perform a specific assay. Protocols
      ensure reproducibility across laboratories. Contains universal slots; domain-specific
      details are in protocol subclasses (ImagingProtocol, StainingProtocol, etc.).
      Protocols can reference other protocols via sub_protocols to represent composite
      workflows (e.g., sample preparation, wash steps, or post-processing protocols
      that are shared across assays).
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    mappings:
    - OBI:0000272
    is_a: NamedThing
    slots:
    - id
    - name
    - description
    - protocol_type
    - protocol_version
    - equipment_required
    - sub_protocols
    - quality_control_criteria
    - replicate_requirements
    - protocol_author
    - institution
    - publication_reference
    - last_updated
    - validation_status
    class_uri: OBI:0000272
  ImagingProtocol:
    name: ImagingProtocol
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/ImagingProtocol
    description: Protocol for imaging-based assays (CBF, ASL, MCC). Captures frame
      rate, duration, resolution, and tracer/labeling details.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: Protocol
    slots:
    - id
    - name
    - description
    - protocol_type
    - protocol_version
    - equipment_required
    - sub_protocols
    - quality_control_criteria
    - replicate_requirements
    - protocol_author
    - institution
    - publication_reference
    - last_updated
    - validation_status
    - imaging_frame_rate
    - imaging_duration
    - spatial_resolution
    - fluorescent_labeling
    - fluorescent_tracer
    - evaporation_prevention
    - particle_tracking_method
    - temperature_control
    - humidity_control
    - particle_size
    class_uri: assay_base:ImagingProtocol
  StainingProtocol:
    name: StainingProtocol
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/StainingProtocol
    description: Protocol for staining-based assays (goblet cell, immunofluorescence).
      Captures staining type, antibodies, fixation, and detection details.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: Protocol
    slots:
    - id
    - name
    - description
    - protocol_type
    - protocol_version
    - equipment_required
    - sub_protocols
    - quality_control_criteria
    - replicate_requirements
    - protocol_author
    - institution
    - publication_reference
    - last_updated
    - validation_status
    - staining_type
    - antibodies_used
    - detection_method
    - normalization_method
    - fixation_method
    - counterstain
    class_uri: assay_base:StainingProtocol
  SpirometryProtocol:
    name: SpirometryProtocol
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/SpirometryProtocol
    description: Protocol for lung function / spirometry assays. Captures spirometry
      standards, bronchodilator details, and plethysmography method.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: Protocol
    slots:
    - id
    - name
    - description
    - protocol_type
    - protocol_version
    - equipment_required
    - sub_protocols
    - quality_control_criteria
    - replicate_requirements
    - protocol_author
    - institution
    - publication_reference
    - last_updated
    - validation_status
    - spirometry_standard
    - bronchodilator_agent
    - bronchodilator_dose
    - plethysmography_method
    class_uri: assay_base:SpirometryProtocol
  MolecularAssayProtocol:
    name: MolecularAssayProtocol
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/MolecularAssayProtocol
    description: Protocol for molecular biology assays (qRT-PCR, Western blot, ELISA).
      Captures detection method, normalization, primers, and platform details.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: Protocol
    slots:
    - id
    - name
    - description
    - protocol_type
    - protocol_version
    - equipment_required
    - sub_protocols
    - quality_control_criteria
    - replicate_requirements
    - protocol_author
    - institution
    - publication_reference
    - last_updated
    - validation_status
    - detection_method
    - normalization_method
    - antibodies_used
    - primer_sequences
    - reference_gene
    - lysis_buffer
    - platform
    class_uri: assay_base:MolecularAssayProtocol
  QuantityValue:
    name: QuantityValue
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/QuantityValue
    description: A quantity with a numeric value and unit of measurement. Used for
      all measurement values in assays.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    slots:
    - value
    - unit
    class_uri: assay_base:QuantityValue
  Unit:
    name: Unit
    id_prefixes:
    - UO
    - UCUM
    - QUDT
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/Unit
    description: A unit of measurement from a standard ontology (UO, UCUM, QUDT).
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    slots:
    - id
    - name
    class_uri: assay_base:Unit
  NamedEntity:
    name: NamedEntity
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/NamedEntity
    description: A reference to an entity with an identifier and name. Used for cell_type,
      tissue_context, participant references, etc.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    slots:
    - id
    - name
    class_uri: assay_base:NamedEntity
  ExposureCondition:
    name: ExposureCondition
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/ExposureCondition
    description: A structured description of an exposure or treatment applied to a
      biological system. Captures what agent was applied, at what concentration, for
      how long, and when the measurement was taken relative to exposure.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: NamedEntity
    slots:
    - id
    - name
    - exposure_agent
    - exposure_concentration
    - exposure_duration
    - timing_post_exposure
    class_uri: assay_base:ExposureCondition
  CellularSystem:
    name: CellularSystem
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/CellularSystem
    description: Cell-based model systems that use living cells to model biological
      processes. Includes 2D cultures, 3D systems, and co-cultures.
    from_schema: https://w3id.org/EHS-Data-Standards/assay_base
    is_a: ModelSystem
    slots:
    - id
    - name
    - description
    - subject_type
    - model_species
    - cell_line
    - primary_cell
    - cell_type
    - anatomical_origin
    - cell_culture_growth_mode
    - culture_conditions
    - culture_media
    - days_at_differentiation
    - donor_info
    - replicates_per_donor
    class_uri: assay_base:CellularSystem
  TwoDCellCulture:
    name: TwoDCellCulture
    id_prefixes:
    - owg
    definition_uri: https://w3id.org/EHS-Data-Standards/assay_base/TwoDCellCulture
