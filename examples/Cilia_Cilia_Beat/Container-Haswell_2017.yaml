# Extracted from: Haswell LE, Baxter A, Banerjee A, et al. (2017)
#   "Reduced biological effect of e-cigarette aerosol compared to cigarette
#   smoke evaluated in vitro using normalized nicotine dose and RNA-seq-based
#   toxicogenomics." Scientific Reports 7:888. DOI:10.1038/s41598-017-00852-y
# Extraction date: 2026-03-02
#
# Verified ontology identifiers:
#   - CHEBI:17688 (nicotine) - OLS verified
#   - CHEBI:16997 (propane-1,2-diol / propylene glycol) - OLS verified
#   - CHEBI:17754 (glycerol) - OLS verified
#   - CL:0002368 (respiratory tract epithelial cell) - OLS verified
#   - UBERON:0001707 (nasal cavity) - OLS verified
#   - UBERON:0005385 (nasal cavity respiratory epithelium) - OLS verified
#   - UO:0000275 (nanogram per milliliter) - OLS verified
#   Pre-verified from schema: UO:0000187, UO:0000032, UO:0000106,
#   UO:0000105, UO:0000027, NCBITaxon:9606
#
# Study overview:
#   MucilAir(TM) (reconstituted human airway epithelia from nasal swabs,
#   ALI-differentiated) exposed for 1 hour to:
#     - Air control
#     - 3R4F cigarette smoke at 1/30 dilution (HCI regimen)
#     - E-cigarette aerosol (Vype ePen) at 1/7 dilution (~nicotine-matched to 3R4F)
#     - E-cigarette aerosol (Vype ePen) at 1/3 dilution (~2x nicotine vs 3R4F)
#   Endpoints measured at 24hrs and 48hrs post-exposure.
#   Primary donor: #MD058501 (age 41, Caucasian female, non-smoker).
#
# Additional endpoints measured but not fully extracted here:
#   - CBF (ciliary beat frequency): Measured immediately post-exposure.
#     "No reduction in CBF was observed between the air controls and the
#     aerosol treated cells" (Supplementary Fig. S1). Exact values not
#     reported in main text.
#   - TEER: Air 24hrs 1432.7+/-198 Ohm; Air 48hrs 1342.9+/-239 Ohm;
#     E-cig 1/3 24hrs 1130.9+/-93 Ohm; E-cig 1/3 48hrs 1105.9+/-130 Ohm
#     (significant at p<0.05 but within tight junction integrity range).
#     TEER does not map to an assay type in this schema.
#   - LDH release: Below 5% for all treatments (no cytotoxicity).
#   - RNA-seq: 873 DEGs for 3R4F at 24hrs (pFDR<0.01, FC>2); 205 at 48hrs.
#     Only 3 DEGs for e-cig 1/3 at 24hrs and 48hrs individually (pFDR<0.05).
#     113 DEGs for e-cig 1/3 after combining timepoints (pFDR<0.05), only 3
#     exceeded FC of 2. Gene enrichment showed fibrosis, inflammation, DNA
#     damage, oxidative stress, and lung cancer pathways for 3R4F; metabolic/
#     biosynthetic processes and extracellular membrane for e-cigarette.

