# =============================================================================
# PROTOCOLS
# =============================================================================

protocols:
  - id: "PROTOCOL:haswell2017-cbf"
    name: "High-speed video microscopy for CBF (Haswell 2017)"
    description: >-
      CBF measured using inverted AX10 Zeiss microscope (100x magnification,
      10x ocular, 10x objective) fitted with heated chamber (Pecon) at 37C
      and high speed digital camera (Ammons engineering). MucilAir cultures
      equilibrated for 5 min prior to measurement. Video recorded at 120
      frames/s capturing at least 512 frames. CBF measured immediately after
      exposure. Result: No reduction in CBF between air controls and aerosol
      treated cells (Supplementary Fig. S1).
    protocol_version: "1.0"
    quality_control_criteria: "Equilibration for 5 min prior to measurement"
    replicate_requirements: 3
